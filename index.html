<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Coupon Barcode Generator for CouriersPlease</title>
    <style>
        svg {
            margin: 10px;
            display: block;
            /* 讓條碼垂直排列 */
            border-bottom: 1px dashed #ccc;
            /* 加個虛線方便切開（選配） */
        }

        #inputData {
            padding: 8px;
            width: 300px;
            font-size: 16px;
        }

        @media print {

            #inputSection,
            h1,
            p {
                display: none;
            }

            /* 列印時隱藏輸入框和按鈕 */
        }
    </style>
</head>

<body>
    <h1>CourierPlease Coupon Barcode Generator</h1>
    <p>Please input the number of your first coupon, starting with 302, 304, 306, 135, 136, 137, must be ending with 1
    </p>

    <div id="inputSection">
        <input type="text" id="inputData" placeholder="輸入起始編號 / Enter starting number">
        <label for="couponType">Select Coupon Type:</label>

        <select id="couponType" name="couponType">
            <option value="" disabled selected hidden>Select a type</option>
            <option value="30">Yellow / Gold: 30 coupons</option>
            <option value="10">Satchel : 10 coupons </option>
            <option value="75">Gray: 75 coupons</option>
        </select><br>
        <button id="generateBtn">生成 Barcode / Generate barcodes </button><br>
        <button onclick="window.print()">打印 Barcode / Print Barcodes</button>
    </div>

    <h3 class="coupon-list-title""">List of Barcode</h3>
    <div id="container"></div>

    <script src="https://unpkg.com/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <script>
        const barCodeContainer = document.getElementById("container");
        const inputField = document.getElementById("inputData");
        const couponType = document.getElementById("couponType");

        document.getElementById("generateBtn").addEventListener("click", function () {
            // 取得值並去掉空白
            const rawValue = inputField.value.trim();

            // 1. 檢查是否為空
            if (!rawValue) {
                alert("請先輸入資料！/ Please enter a value first!");
                return;
            }

            barCodeContainer.innerHTML = "";
            let barcodeList = [];

            const lastDigit = rawValue.slice(-1);
            if (lastDigit !== "1") {
                alert("條碼起始編號必須以 1 結尾！ / The starting barcode number must end with 1!");
                return;
            }

            // 2. 轉換為數字型態，方便後續做加法運算
            const startNumber = parseInt(rawValue, 10);

            // 3. 檢查是否為有效的數字
            // isNaN 會判斷字串內容是否能轉換成數字
            if (isNaN(rawValue)) {
                alert("請輸入純數字作為條碼起始編號！ / Please enter a valid number as the starting barcode!");
                return;
            }

            // 4. 清空容器
            if (couponType.value === "") {
                alert("請選擇一個類型！ / Please select a coupon type!");
                return;
            }


            const loopNumber = parseInt(couponType.value) || 30; // 預設為 30，如果沒有選擇類型


            // 5. 循環 30 次生成遞增編號
            for (let i = 0; i < loopNumber; i++) {
                // 假設輸入 100，會生成 100, 101, 102...
                // 如果你需要固定長度（如 000100），可以再加 padStart
                const currentNum = (startNumber + i).toString();
                barcodeList.push(currentNum);
            }

            // 6. 渲染條碼
            barcodeList.forEach(data => {
                const newSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                barCodeContainer.appendChild(newSvg);

                JsBarcode(newSvg, data, {
                    format: "CODE128",
                    width: 2,
                    height: 60,
                    displayValue: true
                });
            });
            document.querySelector('.coupon-list-title').textContent = `List of Barcodes (${loopNumber} items)`;
        });
    </script>

</body>

</html>
